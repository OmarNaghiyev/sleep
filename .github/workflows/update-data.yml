name: Update Prayer Times Data

on:
  schedule:
    # Runs at 00:00 UTC on December 31 every year
    - cron: "0 0 31 12 *"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch prayer times from Aladhan API
        run: node scripts/update-data.js

      - name: Commit and push updated data.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js app.js
          git diff --staged --quiet || git commit -m "chore: update prayer times data for $(date +%Y)"
          git push
