<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Расписание сна</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="header">
    <div class="header-inner">
      <span class="header-title">Расписание сна</span>
      <span class="header-sub">Erie, PA · 2026</span>
    </div>
    <div class="header-right">
      <div class="city-switcher">
        <button class="city-btn active" data-city="erie">Erie</button>
        <button class="city-btn" data-city="baku">Baku</button>
      </div>
      <div class="legend">
        <span class="badge badge-50">5-0</span>
        <span class="badge badge-41">4-1</span>
        <span class="badge badge-32">3-2</span>
      </div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="5-0">5-0</button>
    <button class="filter-btn" data-filter="4-1">4-1</button>
    <button class="filter-btn" data-filter="3-2">3-2</button>
  </div>

  <div class="table-wrap">
    <table id="prayerTable">
      <thead>
        <tr>
          <th>Дата</th>
          <th>Иша</th>
          <th>Фаджр</th>
          <th>Рассвет</th>
          <th>Иша → Рассвет</th>
          <th>Время сна</th>
          <th>Схема</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
