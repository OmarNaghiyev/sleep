<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule</title>
  <link rel="icon" type="image/png" href="sleeping_guy.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="header">
    <div class="header-inner">
      <span class="header-title">Schedule</span>
      <span class="header-sub">Erie, PA · 2026</span>
    </div>
    <div class="header-right">
      <div class="city-switcher">
        <button class="city-btn active" data-city="erie">Erie</button>
        <button class="city-btn" data-city="baku">Baku</button>
      </div>
      <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">☀</button>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="5-0">5-0</button>
    <button class="filter-btn" data-filter="4-1">4-1</button>
  </div>

  <div class="table-wrap">
    <table id="prayerTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Fajr</th>
          <th>Sunrise</th>
          <th>Dhuhr</th>
          <th>Asr</th>
          <th>Maghrib</th>
          <th>Isha</th>
          <th>Isha → Sunrise</th>
          <th>Sleep Time</th>
          <th>Scheme</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
